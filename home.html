<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BazzeR - হোম</title>
    <link rel="stylesheet" href="home.css">
</head>
<body>
    <div class="app-container">
        <!-- হেডার -->
        <div class="header">
            <div class="logo-small">Bazze<span>R</span></div>
            <div class="user-info" id="userInfo"></div>
        </div>
        
        <!-- ওয়েলকাম -->
        <div class="welcome-card">
            <h2>স্বাগতম, <span id="userName"></span>! 🎉</h2>
            <p>আজকের সেরা অফারগুলো দেখুন</p>
        </div>
        
        <!-- প্রোডাক্ট গ্রিড -->
        <div class="products-grid" id="productsGrid">
            <!-- প্রোডাক্ট গুলো JS দিয়ে আসবে -->
        </div>
        
        <!-- লগআউট বাটন -->
        <button class="logout-btn" id="logoutBtn">লগআউট করুন</button>
    </div>
    
    <script src="home.js"></script>
</body>
</html>
