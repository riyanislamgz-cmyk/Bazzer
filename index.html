<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazzar OS - Final Ultimate Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00f2ff; --bg: #020205; }
        body { 
            background: var(--bg); background-size: cover; background-position: center; background-attachment: fixed;
            color: #fff; font-family: 'Space Grotesk', sans-serif; transition: 0.5s;
        }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 25px; }
        
        /* Grid Layout Fix */
        .prod-img { width: 100%; height: 200px; object-fit: contain; background: rgba(255,255,255,0.02); border-radius: 20px; }
        
        /* Sidebar/Panels */
        .side-panel { position: fixed; top: 0; right: 0; bottom: 0; width: 350px; background: rgba(5, 5, 10, 0.98); z-index: 1000; transform: translateX(100%); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); border-left: 1px solid var(--p); }
        .side-panel.active { transform: translateX(0); }

        /* Animation */
        .bot-btn { animation: pulse 2s infinite; box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body onload="initSystem()">

    <div id="loader" class="fixed inset-0 bg-black z-[3000] flex flex-col justify-center items-center">
        <h1 class="text-5xl font-cyber text-cyan-400 mb-4 tracking-[10px] animate-pulse">BAZZAR OS</h1>
        <div class="w-48 h-1 bg-white/10 rounded-full overflow-hidden">
            <div class="h-full bg-cyan-500 animate-[loading_2s_ease-in-out_infinite]"></div>
        </div>
        <button onclick="bootApp()" class="mt-10 px-8 py-3 border border-cyan-500 text-cyan-400 font-cyber text-xs hover:bg-cyan-500 hover:text-black transition">INITIALIZE SYSTEM</button>
    </div>

    <div id="app" class="hidden p-4 md:p-8 max-w-7xl mx-auto opacity-0 transition-opacity duration-1000">
        
        <nav class="glass p-5 flex justify-between items-center mb-10 sticky top-4 z-[500]">
            <div class="flex items-center gap-3">
                <i class="fas fa-microchip text-cyan-500 text-2xl"></i>
                <h2 class="font-cyber font-bold text-cyan-400 tracking-tighter">CORE_INTERFACE</h2>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleAdmin()" id="adminBtn" class="hidden text-[10px] bg-red-500/20 text-red-500 border border-red-500/50 px-4 py-1.5 rounded-full uppercase font-bold hover:bg-red-500 hover:text-white transition">Root Terminal</button>
                <button onclick="togglePanel('cartPanel')" class="relative glass w-11 h-11 flex items-center justify-center border border-white/10">
                    <i class="fas fa-shopping-basket text-sm"></i>
                    <span id="cartCount" class="absolute -top-1 -right-1 bg-cyan-500 text-black text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
                </button>
                <div class="flex items-center gap-3 border-l border-white/10 pl-4">
                    <div class="text-right">
                        <p id="uName" class="text-[10px] font-bold">ADMIN_USER</p>
                        <p id="uID" class="text-[8px] text-gray-500">UID: 00000000</p>
                    </div>
                    <div id="uAvatar" class="w-10 h-10 rounded-xl border border-cyan-500 overflow-hidden bg-white/5"></div>
                </div>
            </div>
        </nav>

        <div id="shop" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>

        <div id="adminPanel" class="hidden space-y-10 pb-32 animate__animated animate__fadeIn">
            <div class="flex justify-between items-center border-b border-white/10 pb-4">
                <h1 class="text-3xl font-cyber text-red-500">MASTER_CONTROL_UNIT</h1>
                <button onclick="toggleAdmin()" class="text-xs text-gray-500">CLOSE_SESSION</button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="glass p-8 space-y-4 border-l-2 border-cyan-500">
                    <h3 class="text-xs font-cyber text-cyan-400 uppercase">System Configuration</h3>
                    <input type="text" id="apiInput" placeholder="Gemini API Key" class="w-full bg-white/5 p-4 rounded-xl text-xs outline-none border border-white/10 focus:border-cyan-500">
                    <textarea id="rulesInput" placeholder="AI Core Rules (System Rules)..." class="w-full bg-white/5 p-4 rounded-xl h-24 text-xs outline-none border border-white/10"></textarea>
                    <input type="text" id="bgInput" placeholder="Wallpaper URL (Background Change)" class="w-full bg-white/5 p-4 rounded-xl text-xs border border-white/10">
                    <button onclick="saveAdmin()" class="w-full bg-cyan-600 py-4 rounded-xl font-bold uppercase text-xs hover:bg-cyan-500 transition">Update Kernel</button>
                </div>

                <div class="glass p-8 space-y-4 border-l-2 border-purple-500">
                    <h3 class="text-xs font-cyber text-purple-400 uppercase">Inject New Asset</h3>
                    <input type="text" id="inName" placeholder="Product Name" class="w-full bg-white/5 p-4 rounded-xl text-xs border border-white/10">
                    <input type="number" id="inPrice" placeholder="Price (CR)" class="w-full bg-white/5 p-4 rounded-xl text-xs border border-white/10">
                    <textarea id="inDesc" placeholder="Product Description..." class="w-full bg-white/5 p-4 rounded-xl h-20 text-xs border border-white/10"></textarea>
                    <input type="text" id="inImg" placeholder="Image Direct Link" class="w-full bg-white/5 p-4 rounded-xl text-xs border border-white/10">
                    <button onclick="addItem()" class="w-full bg-purple-600 py-4 rounded-xl font-bold uppercase text-xs hover:bg-purple-500 transition">Sync Product</button>
                </div>

                <div class="lg:col-span-1 glass p-8 border-l-2 border-orange-500">
                    <h3 class="text-xs font-cyber text-orange-400 mb-6 uppercase">Order Monitor</h3>
                    <div id="ordersList" class="space-y-4 max-h-80 overflow-y-auto"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="pModal" class="fixed inset-0 bg-black/95 z-[2000] hidden items-center justify-center p-6">
        <div class="glass max-w-4xl w-full p-8 relative flex flex-col md:flex-row gap-10">
            <button onclick="closePModal()" class="absolute top-5 right-5 text-gray-500 hover:text-white">✕</button>
            <div class="md:w-1/2">
                <img id="mImg" src="" class="w-full h-80 object-contain bg-white/5 rounded-3xl p-4">
            </div>
            <div class="flex-1">
                <h2 id="mName" class="text-3xl font-cyber mb-4 text-cyan-400"></h2>
                <p id="mDesc" class="text-gray-400 text-sm leading-relaxed mb-8 border-l border-cyan-500/30 pl-4"></p>
                <div class="flex justify-between items-center">
                    <span id="mPrice" class="text-3xl font-bold"></span>
                    <button id="mBtn" class="bg-cyan-600 px-10 py-4 rounded-2xl font-bold uppercase text-xs shadow-lg shadow-cyan-900/40">Add To Cart</button>
                </div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-8 left-8 z-[1500]">
        <button onclick="toggleAI()" class="w-16 h-16 bg-cyan-500 rounded-2xl flex items-center justify-center text-black bot-btn">
            <i class="fas fa-robot text-2xl"></i>
        </button>
        <div id="aiChat" class="hidden flex-col glass w-80 h-[450px] mt-4 overflow-hidden border border-cyan-500/30">
            <div class="p-4 bg-cyan-500/10 border-b border-white/10 text-[10px] font-cyber text-cyan-400">NEURAL LINK ACTIVE</div>
            <div id="chatLines" class="flex-1 overflow-y-auto p-4 space-y-3 text-[11px] font-mono">
                <div class="text-gray-500">System: Awaiting instruction...</div>
            </div>
            <div class="p-4 bg-black/40 flex gap-2">
                <input type="text" id="chatIn" placeholder="Ask AI anything..." class="w-full bg-white/5 border border-white/10 rounded-lg p-3 text-xs outline-none">
                <button onclick="askAI()" class="text-cyan-400"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <div id="cartPanel" class="side-panel p-8 flex flex-col">
        <h2 class="font-cyber text-sm mb-10 text-cyan-400 tracking-widest uppercase">Encryption_Cart</h2>
        <div id="cartItems" class="flex-1 space-y-4 overflow-y-auto pr-2"></div>
        <div class="pt-6 border-t border-white/10 mt-6">
            <div class="flex justify-between font-bold mb-6">
                <span class="text-gray-500 text-xs">AGGREGATE:</span>
                <span id="cartTotal" class="text-xl text-white">0 CR</span>
            </div>
            <button onclick="openPayment()" class="w-full bg-orange-600 py-4 rounded-xl font-bold uppercase text-[10px] tracking-widest">Execute Checkout (Nagad)</button>
        </div>
    </div>

    <div id="payModal" class="fixed inset-0 bg-black/98 z-[2500] hidden items-center justify-center p-6">
        <div class="glass max-w-sm w-full p-10 text-center border-orange-500/20">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Nagad_Logo.svg/1024px-Nagad_Logo.svg.png" class="w-16 mx-auto mb-8">
            <div class="bg-black/50 p-4 rounded-2xl mb-8 border border-white/5">
                <p class="text-[10px] text-gray-500 mb-1 uppercase">Merchant Wallet</p>
                <p class="text-xl font-bold text-white tracking-widest">01XXXXXXXXX</p>
            </div>
            <input type="text" id="trxId" placeholder="Input Transaction ID" class="w-full bg-white/5 p-4 rounded-xl text-center mb-6 outline-none font-mono tracking-widest border border-white/10 focus:border-orange-500">
            <button onclick="submitOrder()" class="w-full bg-orange-600 py-4 rounded-xl font-bold uppercase text-xs">Verify & Confirm</button>
            <button onclick="closePayment()" class="mt-6 text-[10px] text-gray-600 uppercase">Abort Transaction</button>
        </div>
    </div>

    <script>
        // System Core Data
        let system = {
            products: JSON.parse(localStorage.getItem('b_prods')) || [
                { id: 101, name: "Neural Processor", price: 1200, desc: "Ultra-fast chip for AI processing and holographic rendering.", img: "https://images.unsplash.com/photo-1591405351990-4726e331f141?w=400" },
                { id: 102, name: "Cypher Key v4", price: 850, desc: "High-security physical key for encrypted database access.", img: "https://images.unsplash.com/photo-1558494949-ef010cbdcc51?w=400" }
            ],
            cart: [],
            orders: JSON.parse(localStorage.getItem('b_orders')) || [],
            adminId: "00000001", // Default Admin UID
            config: {
                apiKey: localStorage.getItem('b_key') || '',
                rules: localStorage.getItem('b_rules') || 'You are Bazzar OS AI. Assist users with their purchases and inventory.',
                bg: localStorage.getItem('b_bg') || ''
            }
        };

        function initSystem() {
            // Setup User (Point 5: UID & Avatar)
            let uid = localStorage.getItem('b_uid') || Math.floor(Math.random()*90000000 + 10000000).toString();
            localStorage.setItem('b_uid', uid);
            
            const is_admin = uid === system.adminId;
            document.getElementById('uName').innerText = is_admin ? "ROOT_ADMIN" : "CLIENT_" + uid.slice(-4);
            document.getElementById('uID').innerText = "UID: " + uid;
            document.getElementById('uAvatar').innerHTML = `<img src="https://api.dicebear.com/7.x/bottts/svg?seed=${uid}" class="w-full h-full">`;
            
            if(is_admin) document.getElementById('adminBtn').classList.remove('hidden');
            if(system.config.bg) document.body.style.backgroundImage = `url('${system.config.bg}')`;
            
            renderShop();
            renderOrders();
        }

        function bootApp() {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            setTimeout(() => document.getElementById('app').style.opacity = '1', 10);
        }

        // Shop Management
        function renderShop() {
            const container = document.getElementById('shop');
            container.innerHTML = '';
            system.products.forEach(p => {
                container.innerHTML += `
                    <div class="glass p-5 group cursor-pointer border border-white/5 hover:border-cyan-500/50 transition-all" onclick="openProduct(${p.id})">
                        <img src="${p.img}" class="prod-img mb-4 group-hover:scale-105 transition-transform">
                        <h3 class="text-[11px] font-cyber tracking-wider text-white uppercase">${p.name}</h3>
                        <div class="flex justify-between items-center mt-4">
                            <span class="text-cyan-400 font-bold font-cyber text-sm">${p.price} CR</span>
                            <i class="fas fa-plus-circle text-gray-600 group-hover:text-cyan-500"></i>
                        </div>
                    </div>
                `;
            });
        }

        function openProduct(id) {
            const p = system.products.find(x => x.id === id);
            document.getElementById('mImg').src = p.img;
            document.getElementById('mName').innerText = p.name;
            document.getElementById('mDesc').innerText = p.desc;
            document.getElementById('mPrice').innerText = p.price + " CR";
            document.getElementById('mBtn').onclick = () => { addToCart(p.id); closePModal(); };
            document.getElementById('pModal').style.display = 'flex';
        }

        // Cart Logic
        function addToCart(id) {
            const p = system.products.find(x => x.id === id);
            system.cart.push(p);
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cartItems');
            let total = 0; list.innerHTML = '';
            system.cart.forEach((item, idx) => {
                total += parseInt(item.price);
                list.innerHTML += `
                    <div class="bg-white/5 p-4 rounded-2xl flex justify-between items-center animate__animated animate__fadeInRight">
                        <div>
                            <p class="text-[11px] font-bold text-white">${item.name}</p>
                            <p class="text-[10px] text-cyan-500">${item.price} CR</p>
                        </div>
                        <button onclick="removeFromCart(${idx})" class="text-gray-600 hover:text-red-500"><i class="fas fa-times"></i></button>
                    </div>
                `;
            });
            document.getElementById('cartTotal').innerText = total + " CR";
            document.getElementById('cartCount').innerText = system.cart.length;
        }

        function removeFromCart(idx) {
            system.cart.splice(idx, 1);
            updateCartUI();
        }

        // AI System (Point 3)
        async function askAI() {
            const input = document.getElementById('chatIn');
            const box = document.getElementById('chatLines');
            if(!input.value || !system.config.apiKey) return alert("System Error: AI_KEY_MISSING");

            const prompt = input.value;
            input.value = '';
            box.innerHTML += `<div class="text-right text-cyan-200">>> ${prompt}</div>`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${system.config.apiKey}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Rules: ${system.config.rules}. Inventory: ${JSON.stringify(system.products)}. User says: ${prompt}` }] }] })
                });
                const data = await response.json();
                const aiMsg = data.candidates[0].content.parts[0].text;
                box.innerHTML += `<div class="text-cyan-500">AI: ${aiMsg}</div>`;
                box.scrollTop = box.scrollHeight;
            } catch (e) { box.innerHTML += `<div class="text-red-500">LINK_ERROR: Unable to connect to Gemini Core.</div>`; }
        }

        // Order Management (Point 4: সিরিয়াল অর্ডার আইডি)
        function submitOrder() {
            const trx = document.getElementById('trxId').value;
            if(trx.length < 5) return alert("INVALID_TRX_ID");

            const orderId = (111 + system.orders.length).toString().padStart(4, '0');
            const newOrder = {
                id: orderId,
                user: document.getElementById('uName').innerText,
                items: system.cart.map(c => c.name).join(", "),
                total: document.getElementById('cartTotal').innerText,
                trx: trx,
                status: "Pending Verification"
            };

            system.orders.push(newOrder);
            localStorage.setItem('b_orders', JSON.stringify(system.orders));
            alert("SUCCESS: Order ID #" + orderId + " has been logged.");
            system.cart = []; updateCartUI(); closePayment(); togglePanel('cartPanel');
            renderOrders();
        }

        // Admin Helpers (Point 2)
        function addItem() {
            const p = {
                id: Date.now(),
                name: document.getElementById('inName').value,
                price: document.getElementById('inPrice').value,
                desc: document.getElementById('inDesc').value,
                img: document.getElementById('inImg').value
            };
            if(!p.name || !p.price) return alert("MISSING_DATA");
            system.products.push(p);
            localStorage.setItem('b_prods', JSON.stringify(system.products));
            renderShop(); alert("ASSET_INJECTED");
        }

        function saveAdmin() {
            system.config.apiKey = document.getElementById('apiInput').value;
            system.config.rules = document.getElementById('rulesInput').value;
            system.config.bg = document.getElementById('bgInput').value;
            localStorage.setItem('b_key', system.config.apiKey);
            localStorage.setItem('b_rules', system.config.rules);
            if(system.config.bg) {
                localStorage.setItem('b_bg', system.config.bg);
                document.body.style.backgroundImage = `url('${system.config.bg}')`;
            }
            alert("SYSTEM_REBOOT_COMPLETE");
        }

        function renderOrders() {
            const list = document.getElementById('ordersList');
            list.innerHTML = '';
            system.orders.slice().reverse().forEach(o => {
                list.innerHTML += `
                    <div class="bg-white/5 p-4 rounded-xl border-l-2 border-orange-500 text-[10px]">
                        <div class="flex justify-between font-bold mb-1"><span>#${o.id}</span><span class="text-orange-500">${o.total}</span></div>
                        <p class="text-gray-500 mb-2 truncate">${o.items}</p>
                        <p class="text-cyan-400 font-mono tracking-tighter">TRX: ${o.trx}</p>
                    </div>
                `;
            });
        }

        // UI Handlers
        function toggleAdmin() { 
            const is_admin = localStorage.getItem('b_uid') === system.adminId;
            if(!is_admin) {
                const pass = prompt("Access Restricted. Enter Root Password:");
                if(pass !== "admin123") return alert("ACCESS_DENIED");
                localStorage.setItem('b_uid', system.adminId);
                location.reload();
            }
            document.getElementById('shop').classList.toggle('hidden');
            document.getElementById('adminPanel').classList.toggle('hidden');
        }
        function togglePanel(id) { document.getElementById(id).classList.toggle('active'); }
        function toggleAI() { const c = document.getElementById('aiChat'); c.style.display = c.style.display === 'flex' ? 'none' : 'flex'; }
        function closePModal() { document.getElementById('pModal').style.display = 'none'; }
        function openPayment() { if(system.cart.length > 0) document.getElementById('payModal').style.display = 'flex'; }
        function closePayment() { document.getElementById('payModal').style.display = 'none'; }
    </script>
</body>
                        </html>
