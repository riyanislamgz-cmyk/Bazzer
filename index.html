<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazzar OS 4.0 - AI Integrated</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2ff; --bg: #050508; }
        body { background: var(--bg); color: #e0e0e0; font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; background-size: cover; background-attachment: fixed; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .sidebar { position: fixed; top: 0; right: 0; bottom: 0; background: rgba(5, 5, 10, 0.98); z-index: 200; transform: translateX(100%); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar.active { transform: translateX(0); }
        #aiChat { position: fixed; bottom: 20px; left: 20px; z-index: 500; }
        .chat-box { width: 300px; height: 400px; display: none; flex-direction: column; }
    </style>
</head>
<body>

    <div id="welcomeScreen" class="fixed inset-0 bg-black z-[1000] flex flex-col justify-center items-center transition-all duration-1000">
        <h1 class="text-6xl font-cyber neon-text mb-6">BAZZAR OS</h1>
        <button onclick="initSystem()" class="px-8 py-3 border border-cyan-500 text-cyan-400 rounded-full hover:bg-cyan-500 hover:text-black transition uppercase font-bold text-xs tracking-widest">Connect Node</button>
    </div>

    <div id="appUI" class="hidden opacity-0 transition-opacity duration-1000 p-4 md:p-8">
        <nav class="max-w-6xl mx-auto glass p-4 flex justify-between items-center mb-10 sticky top-4 z-50">
            <span class="font-cyber font-bold text-cyan-400 text-xs">BAZZAR AI</span>
            <div class="flex items-center gap-3">
                <button id="adminBtn" onclick="showView('admin')" class="hidden text-[10px] text-red-500 border border-red-500 px-3 py-1 rounded-full uppercase">Terminal</button>
                <button onclick="toggleSidebar('cartSide')" class="relative w-10 h-10 glass flex items-center justify-center"><i class="fas fa-shopping-cart text-xs"></i><span id="cartCount" class="absolute -top-1 -right-1 bg-cyan-500 text-black text-[9px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span></button>
                <button onclick="toggleSidebar('profileSide')" class="w-10 h-10 rounded-full border border-cyan-500/30 overflow-hidden"><img id="navAvatar" class="w-full h-full"></button>
            </div>
        </nav>

        <main id="storeView" class="max-w-6xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-6"></main>

        <main id="adminView" class="max-w-6xl mx-auto hidden space-y-8 pb-20">
            <div class="flex justify-between items-center border-b border-white/10 pb-4">
                <h2 class="text-xl font-cyber text-red-500">ROOT CONFIG</h2>
                <button onclick="showView('store')" class="text-xs text-gray-500">BACK</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="glass p-6 space-y-4">
                    <h3 class="text-xs font-bold text-cyan-400 uppercase">AI Neural Rules</h3>
                    <textarea id="aiRules" placeholder="Enter AI behavior rules..." class="w-full bg-white/5 p-3 rounded-xl h-32 text-xs outline-none border border-white/10"></textarea>
                    <input type="password" id="apiKey" placeholder="Gemini API Key" class="w-full bg-white/5 p-3 rounded-xl text-xs outline-none">
                    <button onclick="saveAdminConfigs()" class="w-full bg-cyan-600 py-3 rounded-xl font-bold text-xs uppercase">Save Config</button>
                </div>
                <div class="glass p-6 space-y-4">
                    <h3 class="text-xs font-bold text-purple-400 uppercase">Add Product</h3>
                    <input type="text" id="pName" placeholder="Name" class="w-full bg-white/5 p-3 rounded-xl text-xs">
                    <input type="number" id="pPrice" placeholder="Price" class="w-full bg-white/5 p-3 rounded-xl text-xs">
                    <textarea id="pDesc" placeholder="Description" class="w-full bg-white/5 p-3 rounded-xl h-20 text-xs"></textarea>
                    <input type="text" id="pImg" placeholder="Image URL" class="w-full bg-white/5 p-3 rounded-xl text-xs">
                    <button onclick="addNewProduct()" class="w-full bg-purple-600 py-3 rounded-xl font-bold text-xs">SYNC ITEM</button>
                </div>
                <div class="glass p-6 max-h-[400px] overflow-y-auto">
                    <h3 class="text-xs font-bold text-orange-400 uppercase mb-4">Live Orders</h3>
                    <div id="orderLog" class="space-y-3"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="productModal" class="fixed inset-0 bg-black/90 z-[600] hidden items-center justify-center p-6">
        <div class="glass max-w-lg w-full p-8 relative">
            <button onclick="closeProductModal()" class="absolute top-4 right-4 text-gray-500">✕</button>
            <img id="modalImg" class="w-full h-56 object-cover rounded-2xl mb-6">
            <h2 id="modalName" class="text-2xl font-bold mb-2 font-cyber"></h2>
            <p id="modalDesc" class="text-sm text-gray-400 mb-6 leading-relaxed"></p>
            <div class="flex justify-between items-center">
                <span id="modalPrice" class="text-xl font-bold text-cyan-400"></span>
                <button id="modalAddBtn" class="bg-cyan-600 px-8 py-3 rounded-xl font-bold text-xs uppercase">Add to Cart</button>
            </div>
        </div>
    </div>

    <div id="aiChat">
        <button onclick="toggleChat()" class="w-14 h-14 bg-cyan-500 rounded-full flex items-center justify-center shadow-lg shadow-cyan-500/30 animate-bounce">
            <i class="fas fa-robot text-black text-xl"></i>
        </button>
        <div id="chatBox" class="chat-box glass mt-4 overflow-hidden border-cyan-500/30 p-4">
            <div class="flex-1 overflow-y-auto text-[11px] space-y-3 mb-4 pr-2" id="chatLines">
                <div class="bg-white/5 p-2 rounded-lg text-cyan-400 italic">Systems Online. How can I assist?</div>
            </div>
            <div class="flex gap-2">
                <input type="text" id="chatInput" placeholder="Ask AI..." class="bg-white/5 border border-white/10 rounded-lg p-2 text-[10px] w-full outline-none">
                <button onclick="askAI()" class="text-cyan-400 px-2"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <div id="cartSide" class="sidebar w-80 p-8 flex flex-col border-l border-white/10 shadow-2xl">
        <h2 class="font-cyber text-xs mb-6 tracking-widest text-cyan-400">SECURE_CART</h2>
        <div id="cartItems" class="flex-1 space-y-4 overflow-y-auto text-xs"></div>
        <div class="pt-4 border-t border-white/10"><button onclick="checkout()" class="w-full bg-cyan-600 py-3 rounded-xl font-bold text-[10px] uppercase">Checkout</button></div>
    </div>

    <script>
        let products = JSON.parse(localStorage.getItem('b_prods')) || [
            { id: 1, name: "Neural Vision Goggles", price: 850, desc: "High-resolution AR experience with neural connectivity.", img: "https://images.unsplash.com/photo-1573333235114-1e5f8bc87820?w=400" },
            { id: 2, name: "Cyber Pad v2", price: 420, desc: "Ultra-slim haptic touch interface for daily matrix tasks.", img: "https://images.unsplash.com/photo-1544117518-2b47abc19f0d?w=400" }
        ];
        let cart = [];
        let user = null;
        let aiRules = localStorage.getItem('ai_rules') || "You are Bazzar AI assistant. Help users with products and payment. Nagad TrxID should be 8-10 chars.";

        function initSystem() {
            const savedBg = localStorage.getItem('app_bg');
            if(savedBg) document.body.style.backgroundImage = `url('${savedBg}')`;
            
            let id = localStorage.getItem('u_id') || Math.floor(Math.random()*100000000).toString().padStart(8,'0');
            localStorage.setItem('u_id', id);
            user = { id, name: id==="00000001" ? "ADMIN" : "GUEST_"+id.slice(-4), avatar: `https://api.dicebear.com/7.x/bottts/svg?seed=${id}` };
            
            document.getElementById('navAvatar').src = user.avatar;
            if(user.id === "00000001") document.getElementById('adminBtn').classList.remove('hidden');
            
            document.getElementById('welcomeScreen').style.opacity = "0";
            setTimeout(() => {
                document.getElementById('welcomeScreen').style.display = "none";
                document.getElementById('appUI').classList.remove('hidden');
                setTimeout(() => document.getElementById('appUI').style.opacity = "1", 50);
            }, 1000);
            renderStore();
        }

        // Store & Product Detail
        function renderStore() {
            const grid = document.getElementById('storeView');
            grid.innerHTML = '';
            products.forEach(p => {
                grid.innerHTML += `
                    <div class="glass p-3 cursor-pointer group" onclick="showProduct(${p.id})">
                        <img src="${p.img}" class="h-32 w-full object-cover rounded-xl mb-3 grayscale group-hover:grayscale-0 transition">
                        <h3 class="text-[10px] font-bold uppercase truncate">${p.name}</h3>
                        <p class="text-[10px] text-cyan-400 font-bold mt-1">${p.price} CR</p>
                    </div>
                `;
            });
        }

        function showProduct(id) {
            const p = products.find(x => x.id === id);
            document.getElementById('modalImg').src = p.img;
            document.getElementById('modalName').innerText = p.name;
            document.getElementById('modalDesc').innerText = p.desc;
            document.getElementById('modalPrice').innerText = p.price + " CR";
            document.getElementById('modalAddBtn').onclick = () => { addToCart(p.id); closeProductModal(); };
            document.getElementById('productModal').classList.remove('hidden');
            document.getElementById('productModal').classList.add('flex');
        }

        function closeProductModal() { document.getElementById('productModal').classList.add('hidden'); }

        // AI Chat System
        async function askAI() {
            const input = document.getElementById('chatInput');
            const lines = document.getElementById('chatLines');
            const key = document.getElementById('apiKey').value || localStorage.getItem('api_key');
            
            if(!input.value || !key) return alert("Please set API Key in Terminal first.");

            lines.innerHTML += `<div class="text-right text-gray-500">You: ${input.value}</div>`;
            const msg = input.value;
            input.value = '';

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Rules: ${aiRules}. User Message: ${msg}` }] }] })
                });
                const data = await response.json();
                const aiMsg = data.candidates[0].content.parts[0].text;
                lines.innerHTML += `<div class="text-cyan-400">AI: ${aiMsg}</div>`;
                lines.scrollTop = lines.scrollHeight;
            } catch (e) { lines.innerHTML += `<div class="text-red-500">Error connecting to Neural Net.</div>`; }
        }

        // Admin Actions
        function saveAdminConfigs() {
            localStorage.setItem('api_key', document.getElementById('apiKey').value);
            localStorage.setItem('ai_rules', document.getElementById('aiRules').value);
            aiRules = document.getElementById('aiRules').value;
            alert("Configurations Synced.");
        }

        function addNewProduct() {
            const p = { id: Date.now(), name: document.getElementById('pName').value, price: document.getElementById('pPrice').value, desc: document.getElementById('pDesc').value, img: document.getElementById('pImg').value };
            products.push(p);
            localStorage.setItem('b_prods', JSON.stringify(products));
            renderStore();
            alert("Product Materialized!");
        }

        // Navigation
        function showView(v) {
            document.getElementById('storeView').classList.toggle('hidden', v==='admin');
            document.getElementById('adminView').classList.toggle('hidden', v==='store');
        }
        function toggleSidebar(id) { document.getElementById(id).classList.toggle('active'); }
        function toggleChat() { 
            const box = document.getElementById('chatBox');
            box.style.display = box.style.display === 'flex' ? 'none' : 'flex';
        }

        function addToCart(id) {
            cart.push(products.find(p => p.id === id));
            document.getElementById('cartCount').innerText = cart.length;
            updateCart();
        }

        function updateCart() {
            const list = document.getElementById('cartItems');
            list.innerHTML = '';
            cart.forEach((i, idx) => {
                list.innerHTML += `<div class="flex justify-between glass p-2"><span>${i.name}</span><button onclick="cart.splice(${idx},1);updateCart()">✕</button></div>`;
            });
        }

        function checkout() { alert("Initialize Payment at AI Bot or Modal."); }
    </script>
</body>
                    </html>
