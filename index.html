<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>অ্যাপস্টোর - শপিং অ্যাপ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container">
    <!-- স্ট্যাটাস বার -->
    <div class="status-bar">
        <span class="time">9:41</span>
        <div class="header-actions">
            <span>📶</span> <span>🔋</span>
            <button class="dark-toggle" id="darkModeToggle">🌙 ডার্ক</button>
        </div>
    </div>

    <!-- সার্চ -->
    <div class="search-section">
        <div class="search-box">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="সার্চ করুন পণ্য...">
        </div>
    </div>

    <!-- টপ ট্যাব -->
    <div class="nav-tabs">
        <div class="nav-tab active" data-tab="home">🏠 হোম</div>
        <div class="nav-tab" data-tab="cart">🛒 কার্ট (<span id="cartCountBadge">0</span>)</div>
    </div>

    <!-- পেজ: হোম -->
    <div id="homePage" class="page active-page">
        <div class="slider-container" id="sliderClick">
            <div class="slider" id="heroSlider">
                <img src="https://picsum.photos/id/20/400/200" alt="ব্যানার 1">
                <img src="https://picsum.photos/id/26/400/200" alt="ব্যানার 2">
                <img src="https://picsum.photos/id/30/400/200" alt="ব্যানার 3">
            </div>
        </div>

        <div class="categories-grid" id="categoriesGrid">
            <div class="cat-item" data-cat="all">🔥 সবার জন্য</div>
            <div class="cat-item" data-cat="electronics">📱 ইলেকট্রনিক্স</div>
            <div class="cat-item" data-cat="fashion">👕 ফ্যাশন</div>
            <div class="cat-item" data-cat="beauty">💄 বিউটি</div>
        </div>

        <div id="productsContainer" class="products-grid"></div>
    </div>

    <!-- পেজ: প্রোডাক্ট ডিটেইল -->
    <div id="detailPage" class="page">
        <button class="back-button" onclick="showHomeFromDetail()">← ব্যাক টু হোম</button>
        <div id="productDetailContainer"></div>
    </div>

    <!-- পেজ: কার্ট -->
    <div id="cartPage" class="page">
        <h3 style="margin-bottom: 14px;">🛒 আমার ব্যাগ</h3>
        <div id="cartItemsList" class="cart-items-list"></div>
        <div id="cartTotal" class="cart-total"></div>
        <button id="checkoutBtn" class="order-button">💳 চেকআউট করুন</button>
    </div>

    <!-- পেজ: চেকআউট -->
    <div id="checkoutPage" class="page">
        <button class="back-button" onclick="backToCart()">← কার্টে ফিরুন</button>
        <div class="checkout-container">
            <h3>📦 অর্ডার কনফার্মেশন</h3>
            <div id="checkoutDetails"></div>
            <input type="text" id="addressInput" class="address-input" placeholder="আপনার ঠিকানা লিখুন">
            <button id="confirmOrderBtn" class="order-button">✅ অর্ডার কনফার্ম করুন</button>
        </div>
    </div>

    <!-- বটম নেভ -->
    <div class="bottom-nav">
        <div class="nav-icon active" data-nav="home">🏠 হোম</div>
        <div class="nav-icon" data-nav="cart">🛒 কার্ট</div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
