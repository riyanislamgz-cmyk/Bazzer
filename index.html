<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazzar OS 4.0 - Ultra Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00f2ff; --bg: #020205; }
        body { 
            background-color: var(--bg); 
            background-size: cover; 
            background-position: center; 
            background-attachment: fixed; 
            color: #e0e0e0; 
            font-family: 'Space Grotesk', sans-serif; 
            transition: 0.5s ease;
        }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 28px; }
        
        /* Sidebar */
        .sidebar { position: fixed; top: 0; right: 0; bottom: 0; background: rgba(5, 5, 10, 0.98); z-index: 500; transform: translateX(100%); transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar.active { transform: translateX(0); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        /* Bot Animation */
        .bot-pulse { box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body onload="initSystem()">

    <div id="entrance" class="fixed inset-0 bg-black z-[2000] flex flex-col justify-center items-center transition-all duration-1000">
        <h1 class="text-7xl font-cyber font-black text-white mb-10 tracking-tighter italic">BAZZAR</h1>
        <button onclick="startApp()" class="px-12 py-4 border-2 border-cyan-500 text-cyan-400 rounded-full font-bold uppercase tracking-widest hover:bg-cyan-500 hover:text-black transition-all">Connect System</button>
    </div>

    <div id="mainApp" class="hidden opacity-0 p-4 md:p-8 max-w-7xl mx-auto">
        
        <nav class="glass p-5 flex justify-between items-center mb-10 sticky top-4 z-[100]">
            <div class="flex items-center gap-3">
                <div class="w-2 h-8 bg-cyan-500 rounded-full shadow-[0_0_15px_#00f2ff]"></div>
                <h2 class="font-cyber font-bold tracking-widest text-sm">BAZZAR OS <span class="text-[10px] opacity-50">v4.0</span></h2>
            </div>
            <div class="flex items-center gap-4">
                <button id="adminBtn" onclick="toggleView('admin')" class="hidden text-[10px] border border-red-500 text-red-500 px-4 py-1.5 rounded-full font-bold uppercase hover:bg-red-500 hover:text-white transition">Admin Panel</button>
                <button onclick="toggleSidebar('cartSide')" class="relative glass w-11 h-11 flex items-center justify-center">
                    <i class="fas fa-shopping-cart text-sm"></i>
                    <span id="cartCount" class="absolute -top-1 -right-1 bg-white text-black text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
                </button>
                <button onclick="toggleSidebar('profileSide')" class="w-11 h-11 rounded-full border-2 border-cyan-500/30 overflow-hidden">
                    <img id="navAvatar" src="" class="w-full h-full object-cover">
                </button>
            </div>
        </nav>

        <section id="storeView" class="grid grid-cols-2 lg:grid-cols-4 gap-6 animate-fade-in">
            </section>

        <section id="adminView" class="hidden space-y-10 pb-32">
            <div class="flex justify-between items-center">
                <h1 class="text-3xl font-cyber text-red-500">ROOT CONFIGURATION</h1>
                <button onclick="toggleView('store')" class="text-xs text-gray-500 uppercase">Exit Terminal</button>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="glass p-8 space-y-5 border-cyan-500/20">
                    <h3 class="text-xs font-cyber text-cyan-400 uppercase tracking-[4px]">System Rules</h3>
                    <input type="password" id="apiKeyInput" placeholder="Gemini API Key" class="w-full bg-white/5 p-4 rounded-2xl outline-none text-xs border border-white/5 focus:border-cyan-500">
                    <textarea id="aiRulesInput" placeholder="AI Behavior Rules..." class="w-full bg-white/5 p-4 rounded-2xl h-32 outline-none text-xs border border-white/5 focus:border-cyan-500"></textarea>
                    <input type="text" id="bgInput" placeholder="Background Image URL" class="w-full bg-white/5 p-4 rounded-2xl outline-none text-xs border border-white/5">
                    <button onclick="saveAdminSettings()" class="w-full bg-cyan-600 py-4 rounded-2xl font-bold uppercase tracking-widest text-[10px]">Sync System</button>
                </div>

                <div class="glass p-8 space-y-5 border-purple-500/20">
                    <h3 class="text-xs font-cyber text-purple-400 uppercase tracking-[4px]">Inventory Add</h3>
                    <input type="text" id="newPName" placeholder="Product Name" class="w-full bg-white/5 p-4 rounded-2xl outline-none text-xs">
                    <input type="number" id="newPPrice" placeholder="Price (CR)" class="w-full bg-white/5 p-4 rounded-2xl outline-none text-xs">
                    <textarea id="newPDesc" placeholder="Description..." class="w-full bg-white/5 p-4 rounded-2xl h-24 outline-none text-xs"></textarea>
                    <input type="text" id="newPImg" placeholder="Image URL (Direct link)" class="w-full bg-white/5 p-4 rounded-2xl outline-none text-xs">
                    <button onclick="addProduct()" class="w-full bg-purple-600 py-4 rounded-2xl font-bold uppercase text-[10px]">Add Product</button>
                </div>

                <div class="lg:col-span-3 glass p-8">
                    <h3 class="text-xs font-cyber text-orange-400 mb-8 uppercase tracking-[4px]">Real-time Orders</h3>
                    <div id="orderLog" class="grid grid-cols-1 md:grid-cols-2 gap-5"></div>
                </div>
            </div>
        </section>
    </div>

    <div id="productModal" class="fixed inset-0 bg-black/95 z-[1000] hidden items-center justify-center p-5">
        <div class="glass max-w-2xl w-full p-8 relative flex flex-col md:flex-row gap-8">
            <button onclick="closeModal('productModal')" class="absolute top-5 right-5 text-gray-500 hover:text-white">✕</button>
            <img id="modalImg" src="" class="w-full md:w-1/2 h-72 object-cover rounded-3xl shadow-2xl">
            <div class="flex-1 flex flex-col justify-center">
                <h2 id="modalName" class="text-3xl font-cyber mb-4"></h2>
                <p id="modalDesc" class="text-gray-400 text-sm leading-loose mb-8"></p>
                <div class="flex justify-between items-center">
                    <span id="modalPrice" class="text-2xl font-bold text-cyan-400"></span>
                    <button id="modalBuyBtn" class="bg-cyan-600 px-10 py-4 rounded-2xl font-bold uppercase text-xs tracking-widest hover:scale-105 transition">Add to Cart</button>
                </div>
            </div>
        </div>
    </div>

    <div id="aiBot" class="fixed bottom-8 left-8 z-[1000]">
        <button onclick="toggleChat()" class="w-16 h-16 bg-cyan-500 rounded-2xl flex items-center justify-center text-black shadow-2xl bot-pulse">
            <i class="fas fa-robot text-2xl"></i>
        </button>
        <div id="chatBox" class="hidden flex-col glass w-80 h-[450px] mt-4 overflow-hidden shadow-2xl border-cyan-500/20">
            <div class="p-4 bg-cyan-500/10 border-b border-white/10 font-cyber text-[10px] tracking-widest text-cyan-400">NEURAL ASSISTANT</div>
            <div id="chatLines" class="flex-1 overflow-y-auto p-4 space-y-4 text-[11px] scroll-smooth">
                <div class="bg-white/5 p-3 rounded-2xl border border-white/5">Welcome, Traveler. How may I facilitate your transaction?</div>
            </div>
            <div class="p-4 flex gap-2">
                <input type="text" id="aiInput" placeholder="Message Matrix..." class="w-full bg-white/5 p-3 rounded-xl outline-none text-xs border border-white/10">
                <button onclick="sendToAI()" class="text-cyan-400 px-3"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <div id="cartSide" class="sidebar w-full md:w-96 p-10 flex flex-col">
        <div class="flex justify-between mb-10"><h2 class="font-cyber text-sm tracking-widest">ORDER_QUEUE</h2><button onclick="toggleSidebar('cartSide')">✕</button></div>
        <div id="cartItems" class="flex-1 space-y-5 overflow-y-auto pr-2"></div>
        <div class="pt-8 border-t border-white/10">
            <div class="flex justify-between text-2xl font-bold mb-6"><span>Total:</span><span id="totalPrice" class="text-cyan-400">0</span></div>
            <button onclick="openNagad()" class="w-full bg-orange-600 py-5 rounded-2xl font-bold uppercase text-[10px] tracking-[4px]">Nagad Checkout</button>
        </div>
    </div>

    <div id="profileSide" class="sidebar w-80 p-10">
        <div class="text-center mt-10">
            <div class="w-24 h-24 mx-auto rounded-3xl p-1 bg-gradient-to-tr from-cyan-500 to-purple-600 mb-6">
                <img id="sideAvatar" class="w-full h-full rounded-[22px] bg-black">
            </div>
            <h3 id="sideName" class="text-xl font-bold font-cyber"></h3>
            <p id="sideID" class="text-xs text-cyan-500 font-mono mt-2"></p>
        </div>
        <div class="mt-16 glass p-6 text-center">
            <p class="text-[10px] text-gray-500 uppercase mb-4 tracking-widest">Scan Gateway</p>
            <div id="qrBox" class="bg-white p-2 rounded-2xl inline-block"></div>
        </div>
    </div>

    <div id="nagadModal" class="fixed inset-0 bg-black/95 z-[1500] hidden items-center justify-center p-5">
        <div class="glass max-w-sm w-full p-10 text-center">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c8/Nagad_Logo.svg/1024px-Nagad_Logo.svg.png" class="w-16 mx-auto mb-6">
            <h2 class="text-xl font-bold mb-2">Nagad Payment</h2>
            <p class="text-[11px] text-gray-500 mb-8">Send Money To: <span class="text-white font-bold">01XXXXXXXXX</span></p>
            <input type="text" id="trxIDInput" placeholder="Transaction ID" class="w-full bg-white/5 p-4 rounded-2xl border border-white/10 outline-none text-center font-mono tracking-widest mb-6">
            <button onclick="confirmOrder()" class="w-full bg-orange-600 py-4 rounded-2xl font-bold uppercase text-xs">Verify Payment</button>
            <button onclick="closeModal('nagadModal')" class="mt-4 text-xs text-gray-500 uppercase">Back</button>
        </div>
    </div>

    <script>
        // Core State
        let state = {
            products: JSON.parse(localStorage.getItem('b_products')) || [
                { id: 1, name: "Neural Vision Goggles", price: 850, desc: "Ultra-high resolution AR experience with direct neural feedback systems.", img: "https://images.unsplash.com/photo-1573333235114-1e5f8bc87820?w=600" },
                { id: 2, name: "Cyber Pad v2", price: 420, desc: "A haptic interface designed for fast coding and matrix navigation.", img: "https://images.unsplash.com/photo-1544117518-2b47abc19f0d?w=600" }
            ],
            cart: [],
            orders: JSON.parse(localStorage.getItem('b_orders')) || [],
            user: null,
            api_key: localStorage.getItem('api_key') || '',
            ai_rules: localStorage.getItem('ai_rules') || 'You are Bazzar OS Assistant. Help users with products. Verification: Nagad TrxID must be 8+ characters.'
        };

        function initSystem() {
            // Apply Theme
            const bg = localStorage.getItem('app_bg');
            if(bg) document.body.style.backgroundImage = `url('${bg}')`;

            // ID Management
            let uid = localStorage.getItem('u_id');
            if(!uid) {
                let last = parseInt(localStorage.getItem('last_id') || "0");
                uid = (last + 1).toString().padStart(8, '0');
                localStorage.setItem('u_id', uid);
                localStorage.setItem('last_id', last + 1);
            }

            state.user = {
                id: uid,
                name: uid === "00000001" ? "ADMIN_ROOT" : `GUEST_${uid.slice(-4)}`,
                avatar: `https://api.dicebear.com/7.x/bottts/svg?seed=${uid}`
            };

            // Setup Profile
            document.getElementById('navAvatar').src = state.user.avatar;
            document.getElementById('sideAvatar').src = state.user.avatar;
            document.getElementById('sideName').innerText = state.user.name;
            document.getElementById('sideID').innerText = `ID: ${state.user.id}`;
            
            // Setup QR
            document.getElementById('qrBox').innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${window.location.href}" class="w-32 h-32">`;

            if(state.user.id === "00000001") document.getElementById('adminBtn').classList.remove('hidden');

            renderStore();
        }

        function startApp() {
            const ent = document.getElementById('entrance');
            const app = document.getElementById('mainApp');
            ent.style.opacity = "0";
            setTimeout(() => {
                ent.style.display = "none";
                app.classList.remove('hidden');
                setTimeout(() => app.style.opacity = "1", 50);
            }, 1000);
        }

        function renderStore() {
            const grid = document.getElementById('storeView');
            grid.innerHTML = '';
            state.products.forEach(p => {
                grid.innerHTML += `
                    <div class="glass p-4 cursor-pointer group" onclick="openProduct(${p.id})">
                        <div class="relative overflow-hidden rounded-2xl h-44 mb-5">
                            <img src="${p.img}" class="w-full h-full object-cover transition duration-500 group-hover:scale-110">
                        </div>
                        <h3 class="text-xs font-cyber tracking-widest uppercase truncate mb-2">${p.name}</h3>
                        <div class="flex justify-between items-center">
                            <span class="text-cyan-400 font-bold">${p.price} CR</span>
                            <i class="fas fa-arrow-right text-[10px] opacity-0 group-hover:opacity-100 transition translate-x--2 group-hover:translate-x-0"></i>
                        </div>
                    </div>
                `;
            });
        }

        function openProduct(id) {
            const p = state.products.find(x => x.id === id);
            document.getElementById('modalImg').src = p.img;
            document.getElementById('modalName').innerText = p.name;
            document.getElementById('modalDesc').innerText = p.desc;
            document.getElementById('modalPrice').innerText = `${p.price} CR`;
            document.getElementById('modalBuyBtn').onclick = () => { addToCart(p.id); closeModal('productModal'); };
            document.getElementById('productModal').style.display = 'flex';
        }

        function addToCart(id) {
            state.cart.push(state.products.find(x => x.id === id));
            updateCart();
        }

        function updateCart() {
            const list = document.getElementById('cartItems');
            let total = 0;
            list.innerHTML = '';
            state.cart.forEach((item, idx) => {
                total += parseInt(item.price);
                list.innerHTML += `<div class="flex items-center gap-4 glass p-3 text-xs"><img src="${item.img}" class="w-10 h-10 object-cover rounded-lg"> <span class="flex-1 truncate">${item.name}</span> <span>${item.price}</span> <button onclick="removeFromCart(${idx})">✕</button></div>`;
            });
            document.getElementById('cartCount').innerText = state.cart.length;
            document.getElementById('totalPrice').innerText = total;
        }

        function removeFromCart(idx) { state.cart.splice(idx, 1); updateCart(); }

        // AI Assistant
        async function sendToAI() {
            const input = document.getElementById('aiInput');
            const lines = document.getElementById('chatLines');
            if(!input.value || !state.api_key) return alert("System Config required.");

            const val = input.value;
            input.value = '';
            lines.innerHTML += `<div class="text-right text-gray-500">You: ${val}</div>`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${state.api_key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Rules: ${state.ai_rules}. Message: ${val}` }] }] })
                });
                const data = await res.json();
                const aiMsg = data.candidates[0].content.parts[0].text;
                lines.innerHTML += `<div class="text-cyan-400 bg-cyan-500/5 p-3 rounded-2xl border border-cyan-500/10">AI: ${aiMsg}</div>`;
                lines.scrollTop = lines.scrollHeight;
            } catch (e) {
                lines.innerHTML += `<div class="text-red-500">Neural Sync Error. Check API Key.</div>`;
            }
        }

        // Order Logic
        function confirmOrder() {
            const trx = document.getElementById('trxIDInput').value;
            if(trx.length < 8) return alert("Invalid TRX ID Format.");

            const orderID = (111 + state.orders.length).toString().padStart(4, '0');
            const newOrder = {
                id: orderID,
                u_id: state.user.id,
                u_name: state.user.name,
                items: state.cart.map(c => c.name).join(", "),
                total: document.getElementById('totalPrice').innerText,
                trx: trx,
                time: new Date().toLocaleTimeString()
            };

            state.orders.push(newOrder);
            localStorage.setItem('b_orders', JSON.stringify(state.orders));
            alert(`Order Successful! ID: ${orderID}`);
            state.cart = [];
            updateCart();
            closeModal('nagadModal');
            toggleSidebar('cartSide');
        }

        // Admin Functions
        function saveAdminSettings() {
            state.api_key = document.getElementById('apiKeyInput').value;
            state.ai_rules = document.getElementById('aiRulesInput').value;
            const bg = document.getElementById('bgInput').value;
            
            localStorage.setItem('api_key', state.api_key);
            localStorage.setItem('ai_rules', state.ai_rules);
            if(bg) {
                localStorage.setItem('app_bg', bg);
                document.body.style.backgroundImage = `url('${bg}')`;
            }
            alert("Master Config Updated.");
        }

        function addProduct() {
            const p = {
                id: Date.now(),
                name: document.getElementById('newPName').value,
                price: document.getElementById('newPPrice').value,
                desc: document.getElementById('newPDesc').value,
                img: document.getElementById('newPImg').value
            };
            state.products.push(p);
            localStorage.setItem('b_products', JSON.stringify(state.products));
            renderStore();
            alert("Inventory Synced.");
        }

        function renderOrders() {
            const log = document.getElementById('orderLog');
            log.innerHTML = '';
            state.orders.slice().reverse().forEach(o => {
                log.innerHTML += `
                    <div class="glass p-5 border-l-4 border-cyan-500 text-[11px]">
                        <div class="flex justify-between font-bold text-cyan-400 mb-2"><span>#${o.id}</span><span>${o.time}</span></div>
                        <p class="mb-1">FROM: ${o.u_name} (${o.u_id})</p>
                        <p class="mb-1">ITEMS: ${o.items}</p>
                        <p class="font-bold text-orange-500">TRX: ${o.trx}</p>
                        <div class="text-right mt-2 font-bold">${o.total} CR</div>
                    </div>
                `;
            });
        }

        // UI Helpers
        function toggleSidebar(id) { document.getElementById(id).classList.toggle('active'); }
        function toggleView(v) {
            document.getElementById('storeView').classList.toggle('hidden', v==='admin');
            document.getElementById('adminView').classList.toggle('hidden', v==='store');
            if(v === 'admin') renderOrders();
        }
        function toggleChat() { 
            const box = document.getElementById('chatBox');
            box.style.display = box.style.display === 'flex' ? 'none' : 'flex';
        }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function openNagad() { if(state.cart.length > 0) document.getElementById('nagadModal').style.display = 'flex'; }
    </script>
</body>
    </html>
