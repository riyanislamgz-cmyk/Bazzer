<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>BazzeR - লগইন</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div class="logo-area">
            <div class="logo">Bazze<span>R</span></div>
            <div class="slogan">শপিং + টাস্ক + পয়েন্ট</div>
        </div>

        <div class="login-tabs">
            <button class="tab-btn active" data-tab="login">লগইন</button>
            <button class="tab-btn" data-tab="register">রেজিস্টার</button>
        </div>

        <!-- লগইন ফর্ম -->
        <div id="loginForm" class="form-box active">
            <input type="text" id="loginEmail" placeholder="ইমেইল বা ফোন" autocomplete="off">
            <input type="password" id="loginPassword" placeholder="পাসওয়ার্ড">
            <button id="doLoginBtn" class="btn-primary">লগইন করুন</button>
            <div class="guest-link" id="guestLoginBtn">👉 গেস্ট হিসেবে চালিয়ে যান</div>
        </div>

        <!-- রেজিস্টার ফর্ম -->
        <div id="registerForm" class="form-box">
            <input type="text" id="regName" placeholder="আপনার নাম">
            <input type="email" id="regEmail" placeholder="ইমেইল">
            <input type="tel" id="regPhone" placeholder="ফোন নম্বর">
            <input type="password" id="regPassword" placeholder="পাসওয়ার্ড (৬+ অক্ষর)">
            <input type="text" id="refCode" placeholder="রেফারেল কোড (যদি থাকে)">
            <button id="doRegisterBtn" class="btn-primary">অ্যাকাউন্ট খুলুন</button>
        </div>

        <div class="footer-note">BazzeR - টাস্ক করে পয়েন্ট জিতুন</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
