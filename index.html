<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazzar OS - Final Ultimate Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #00f2ff; --bg: #020205; --s: #ff007a; }
        body { background: var(--bg); color: #fff; font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; }
        .font-cyber { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; transition: 0.3s; }
        .glass:hover { border-color: var(--p); box-shadow: 0 0 20px rgba(0, 242, 255, 0.1); }
        .glitch:hover { text-shadow: 2px 0 var(--s), -2px 0 var(--p); animation: g 0.2s infinite; }
        @keyframes g { 0%,100% {transform: translate(0)} 20% {transform: translate(-2px,2px)} 40% {transform: translate(-2px,-2px)} 60% {transform: translate(2px,2px)} 80% {transform: translate(2px,-2px)} }
        .prod-img { width: 100%; height: 180px; object-fit: contain; background: rgba(255,255,255,0.02); border-radius: 15px; }
        .side-panel { position: fixed; top: 0; right: 0; bottom: 0; width: 350px; background: rgba(5, 5, 10, 0.98); z-index: 1000; transform: translateX(100%); transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); border-left: 1px solid var(--p); }
        .side-panel.active { transform: translateX(0); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--p); border-radius: 10px; }
    </style>
</head>
<body onload="initSystem()">

    <div id="loader" class="fixed inset-0 bg-black z-[3000] flex flex-col justify-center items-center">
        <h1 class="text-4xl font-cyber text-cyan-400 mb-4 tracking-[12px] animate-pulse">BAZZAR OS</h1>
        <button onclick="bootApp()" class="px-10 py-3 border border-cyan-500 text-cyan-400 font-cyber text-[10px] hover:bg-cyan-500 hover:text-black transition tracking-widest">INITIALIZE_KERNEL</button>
    </div>

    <div id="app" class="hidden p-4 md:p-8 max-w-7xl mx-auto opacity-0 transition-opacity duration-1000">
        
        <nav class="glass p-5 flex justify-between items-center mb-10 sticky top-4 z-[500]">
            <div class="flex items-center gap-3 cursor-pointer" onclick="location.reload()">
                <i class="fas fa-microchip text-cyan-500 text-2xl animate-pulse"></i>
                <h2 class="font-cyber font-bold text-cyan-400 tracking-tighter glitch">CORE_INTERFACE</h2>
            </div>
            <div class="flex-1 max-w-md mx-10 hidden md:block">
                <input type="text" oninput="searchProds(this.value)" placeholder="SEARCH_DATABASE..." class="w-full bg-white/5 border border-white/10 rounded-full px-5 py-2 text-xs outline-none focus:border-cyan-500">
            </div>
            <div class="flex items-center gap-4">
                <div class="bg-orange-500/10 border border-orange-500/20 px-3 py-1 rounded-full text-[10px] font-cyber text-orange-400">
                    CR: <span id="walletBal">0</span>
                </div>
                <button onclick="toggleAdmin()" id="adminBtn" class="hidden text-[10px] bg-red-500/20 text-red-500 border border-red-500/50 px-4 py-2 rounded-lg font-bold">ROOT</button>
                <button onclick="togglePanel('cartPanel')" class="relative glass w-11 h-11 flex items-center justify-center">
                    <i class="fas fa-shopping-basket"></i>
                    <span id="cartCount" class="absolute -top-2 -right-2 bg-cyan-500 text-black text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
                </button>
            </div>
        </nav>

        <div id="adminStats" class="hidden grid grid-cols-2 md:grid-cols-4 gap-4 mb-10 animate__animated animate__fadeIn"></div>

        <div id="shop" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-20"></div>

        <div id="adminPanel" class="hidden space-y-10 pb-32">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="glass p-6 space-y-4 border-l-4 border-cyan-500">
                    <h3 class="text-[10px] font-cyber text-cyan-400">SYSTEM_CONFIG</h3>
                    <input type="password" id="apiInput" placeholder="Gemini API Key" class="w-full bg-white/5 p-3 rounded-lg text-xs border border-white/10">
                    <textarea id="rulesInput" placeholder="AI Core Rules..." class="w-full bg-white/5 p-3 rounded-lg h-20 text-xs border border-white/10"></textarea>
                    <button onclick="saveAdmin()" class="w-full bg-cyan-600 py-3 rounded-lg font-bold text-[10px]">UPDATE_KERNEL</button>
                    <button onclick="exportData()" class="w-full bg-gray-700 py-3 rounded-lg font-bold text-[10px]">BACKUP_DATABASE</button>
                </div>
                <div class="glass p-6 space-y-4 border-l-4 border-purple-500">
                    <h3 class="text-[10px] font-cyber text-purple-400">INJECT_ASSET</h3>
                    <input type="text" id="inName" placeholder="Name" class="w-full bg-white/5 p-3 rounded-lg text-xs border border-white/10">
                    <input type="number" id="inPrice" placeholder="Price" class="w-full bg-white/5 p-3 rounded-lg text-xs border border-white/10">
                    <input type="text" id="inImg" placeholder="Image URL" class="w-full bg-white/5 p-3 rounded-lg text-xs border border-white/10">
                    <button onclick="addItem()" class="w-full bg-purple-600 py-3 rounded-lg font-bold text-[10px]">SYNC_ASSET</button>
                </div>
                <div class="glass p-6 border-l-4 border-orange-500">
                    <h3 class="text-[10px] font-cyber text-orange-400 mb-4">ORDER_MONITOR</h3>
                    <div id="ordersList" class="space-y-3 max-h-80 overflow-y-auto"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="pModal" class="fixed inset-0 bg-black/95 z-[2000] hidden items-center justify-center p-4">
        <div class="glass max-w-2xl w-full p-8 relative flex flex-col md:flex-row gap-8">
            <button onclick="closePModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white">✕</button>
            <img id="mImg" src="" class="md:w-1/2 h-64 object-contain bg-white/5 rounded-xl">
            <div class="flex-1">
                <h2 id="mName" class="text-2xl font-cyber text-cyan-400 mb-2"></h2>
                <p id="mDesc" class="text-gray-400 text-xs leading-relaxed mb-8">High-performance digital asset synced via Bazzar OS.</p>
                <div class="flex justify-between items-center">
                    <span id="mPrice" class="text-2xl font-bold font-cyber"></span>
                    <button id="mBtn" class="bg-cyan-600 px-8 py-3 rounded-xl font-bold text-[10px] uppercase">Add_To_Cart</button>
                </div>
            </div>
        </div>
    </div>

    <div id="cartPanel" class="side-panel p-6 flex flex-col">
        <h2 class="font-cyber text-xs text-cyan-400 mb-10">MANIFEST_CART</h2>
        <div id="cartItems" class="flex-1 space-y-4 overflow-y-auto"></div>
        <div class="pt-6 border-t border-white/10 mt-6">
            <div class="flex justify-between font-bold mb-6">
                <span class="text-xs text-gray-500 uppercase tracking-widest">Aggregate:</span>
                <span id="cartTotal" class="text-xl text-white">0 CR</span>
            </div>
            <button onclick="openPayment()" class="w-full bg-orange-600 py-4 rounded-xl font-bold uppercase text-[10px] tracking-widest">Execute_Nagad_Pay</button>
        </div>
    </div>

    <div id="payModal" class="fixed inset-0 bg-black/98 z-[2500] hidden items-center justify-center p-4 text-center">
        <div class="glass max-w-sm w-full p-10 border-orange-500/20">
            <p class="text-orange-500 font-cyber text-xs mb-6 tracking-widest">SECURE_PAYMENT_GATEWAY</p>
            <p class="text-[10px] text-gray-500 mb-2 uppercase">Merchant_Wallet</p>
            <p class="text-xl font-bold mb-8 tracking-[4px]">017XXXXXXXX</p>
            <input type="text" id="trxId" placeholder="ENTER_TRX_ID" class="w-full bg-white/5 p-4 rounded-xl text-center mb-6 border border-white/10 outline-none focus:border-orange-500 font-mono">
            <button onclick="submitOrder()" class="w-full bg-orange-600 py-4 rounded-xl font-bold uppercase text-xs tracking-widest">Verify_And_Confirm</button>
            <button onclick="closePayment()" class="mt-6 text-[10px] text-gray-600 uppercase">Abort_Session</button>
        </div>
    </div>

    <script>
        const sfx = { click: new Audio('https://www.soundjay.com/buttons/sounds/button-50.mp3'), success: new Audio('https://www.soundjay.com/buttons/sounds/button-10.mp3') };
        function playSfx(t) { sfx[t].volume = 0.2; sfx[t].play().catch(()=>{}); }

        let system = {
            products: JSON.parse(localStorage.getItem('b_prods')) || [
                { id: 101, name: "Neural Processor", price: 1200, img: "https://images.unsplash.com/photo-1591405351990-4726e331f141?w=400" },
                { id: 102, name: "Cypher Key v4", price: 850, img: "https://images.unsplash.com/photo-1558494949-ef010cbdcc51?w=400" }
            ],
            cart: [],
            orders: JSON.parse(localStorage.getItem('b_orders')) || [],
            wallet: parseInt(localStorage.getItem('b_wallet')) || 5000,
            adminId: "00000001",
            config: { apiKey: localStorage.getItem('b_key') || '', rules: localStorage.getItem('b_rules') || 'You are Bazzar OS AI.' }
        };

        function initSystem() {
            let uid = localStorage.getItem('b_uid') || Math.floor(Math.random()*90000000 + 10000000).toString();
            localStorage.setItem('b_uid', uid);
            if(uid === system.adminId) {
                document.getElementById('adminBtn').classList.remove('hidden');
                document.getElementById('adminStats').classList.remove('hidden');
            }
            document.getElementById('walletBal').innerText = system.wallet;
            renderShop(); renderOrders(); updateStats();
        }

        function bootApp() {
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            setTimeout(() => document.getElementById('app').style.opacity = '1', 10);
        }

        function renderShop(list = system.products) {
            const container = document.getElementById('shop');
            container.innerHTML = list.map(p => `
                <div class="glass p-5 group cursor-pointer" onclick="openProduct(${p.id})">
                    <img src="${p.img}" class="prod-img mb-4 group-hover:scale-105 transition-transform">
                    <h3 class="text-[10px] font-cyber text-white uppercase tracking-wider">${p.name}</h3>
                    <div class="flex justify-between items-center mt-4">
                        <span class="text-cyan-400 font-bold font-cyber text-xs">${p.price} CR</span>
                        <i class="fas fa-plus-circle text-gray-700 group-hover:text-cyan-500"></i>
                    </div>
                </div>
            `).join('');
        }

        function searchProds(q) { renderShop(system.products.filter(p => p.name.toLowerCase().includes(q.toLowerCase()))); }

        function openProduct(id) {
            playSfx('click');
            const p = system.products.find(x => x.id === id);
            document.getElementById('mImg').src = p.img;
            document.getElementById('mName').innerText = p.name;
            document.getElementById('mPrice').innerText = p.price + " CR";
            document.getElementById('mBtn').onclick = () => { addToCart(p.id); closePModal(); };
            document.getElementById('pModal').style.display = 'flex';
        }

        function addToCart(id) {
            system.cart.push(system.products.find(x => x.id === id));
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cartItems');
            let total = 0;
            list.innerHTML = system.cart.map((item, idx) => {
                total += parseInt(item.price);
                return `<div class="bg-white/5 p-4 rounded-xl flex justify-between items-center"><div><p class="text-[10px] font-bold">${item.name}</p><p class="text-[9px] text-cyan-500">${item.price} CR</p></div><button onclick="removeFromCart(${idx})" class="text-gray-600 hover:text-red-500"><i class="fas fa-times"></i></button></div>`;
            }).join('');
            document.getElementById('cartTotal').innerText = total + " CR";
            document.getElementById('cartCount').innerText = system.cart.length;
        }

        function removeFromCart(idx) { system.cart.splice(idx, 1); updateCartUI(); }

        function submitOrder() {
            const trx = document.getElementById('trxId').value;
            const total = parseInt(document.getElementById('cartTotal').innerText);
            if(trx.length < 5) return alert("INVALID_TRX_ID");
            if(system.wallet < total) return alert("INSUFFICIENT_CREDITS");

            const order = { id: (100+system.orders.length), user: localStorage.getItem('b_uid'), items: system.cart.map(c=>c.name).join(", "), total: total+" CR", trx: trx, status: "Pending" };
            system.orders.push(order);
            system.wallet -= total;
            localStorage.setItem('b_orders', JSON.stringify(system.orders));
            localStorage.setItem('b_wallet', system.wallet);
            
            playSfx('success');
            alert("SUCCESS: ORDER #" + order.id);
            downloadInvoice(order);
            location.reload();
        }

        function downloadInvoice(o) {
            const blob = new Blob([`BAZZAR OS RECEIPT\nOrder: #${o.id}\nItems: ${o.items}\nTotal: ${o.total}\nTrx: ${o.trx}`], {type: 'text/plain'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Invoice_${o.id}.txt`; a.click();
        }

        function updateStats() {
            const rev = system.orders.reduce((s, o) => s + parseInt(o.total), 0);
            document.getElementById('adminStats').innerHTML = `
                <div class="glass p-4 border-cyan-500/20"><p class="text-[8px] text-gray-500">REVENUE</p><p class="text-xl font-bold text-cyan-400">${rev} CR</p></div>
                <div class="glass p-4 border-purple-500/20"><p class="text-[8px] text-gray-500">ASSETS</p><p class="text-xl font-bold text-purple-400">${system.products.length}</p></div>
                <div class="glass p-4 border-orange-500/20"><p class="text-[8px] text-gray-500">ORDERS</p><p class="text-xl font-bold text-orange-400">${system.orders.length}</p></div>
                <div class="glass p-4 border-green-500/20"><p class="text-[8px] text-gray-500">STATUS</p><p class="text-xl font-bold text-green-400">ONLINE</p></div>
            `;
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(system)], {type: 'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "BazzarOS_Backup.json"; a.click();
        }

        function addItem() {
            const p = { id: Date.now(), name: document.getElementById('inName').value, price: document.getElementById('inPrice').value, img: document.getElementById('inImg').value || "https://via.placeholder.com/150" };
            if(!p.name || !p.price) return alert("MISSING_DATA");
            system.products.push(p);
            localStorage.setItem('b_prods', JSON.stringify(system.products));
            renderShop(); alert("ASSET_SYNCED");
        }

        function renderOrders() {
            document.getElementById('ordersList').innerHTML = system.orders.slice().reverse().map(o => `
                <div class="bg-white/5 p-3 rounded-lg border-l-2 border-orange-500 text-[10px]">
                    <div class="flex justify-between font-bold"><span>#${o.id}</span><span>${o.total}</span></div>
                    <p class="text-gray-500 truncate">${o.items}</p>
                </div>
            `).join('');
        }

        function toggleAdmin() {
            if(localStorage.getItem('b_uid') !== system.adminId) {
                if(prompt("ROOT_PASS:") === "admin123") { localStorage.setItem('b_uid', system.adminId); location.reload(); }
            } else {
                document.getElementById('shop').classList.toggle('hidden');
                document.getElementById('adminPanel').classList.toggle('hidden');
            }
        }
        function togglePanel(id) { document.getElementById(id).classList.toggle('active'); }
        function closePModal() { document.getElementById('pModal').style.display = 'none'; }
        function openPayment() { if(system.cart.length > 0) document.getElementById('payModal').style.display = 'flex'; }
        function closePayment() { document.getElementById('payModal').style.display = 'none'; }
    </script>
</body>
                </html>
